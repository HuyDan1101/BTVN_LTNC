name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # 1. Cấu hình Matrix Strategy
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    # 2. Sử dụng biến matrix cho hệ điều hành
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        # Lệnh mvn clean package sẽ chạy đồng thời trên 3 máy ảo khác nhau
        run: mvn clean package

      - name: Archive production artifacts
        # Chỉ upload artifact từ máy Ubuntu để tránh bị trùng lặp file
        if: matrix.os == 'ubuntu-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: bank-system-jar
          path: target/*.jar