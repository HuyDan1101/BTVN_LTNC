name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Verify with JaCoCo
        # Bài 5 dùng 'verify' để JaCoCo kiểm tra rule 80% coverage
        run: mvn clean verify

      - name: Archive production artifacts
        if: matrix.os == 'ubuntu-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: bank-system-jar
          path: target/*.jar

      - name: Upload JaCoCo Coverage Report
        # Dùng always() để kể cả khi build fail do thiếu test, bạn vẫn có báo cáo để xem
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}
          path: target/site/jacoco/