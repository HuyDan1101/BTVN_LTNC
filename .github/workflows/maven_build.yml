name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # Quay lại dùng Ubuntu cho nhẹ và nhanh
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Verify with JaCoCo
        # Lệnh verify sẽ kích hoạt đồng thời: Checkstyle -> Test -> JaCoCo Check
        run: mvn clean verify

      - name: Archive production artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bank-system-jar
          path: target/*.jar

      - name: Upload JaCoCo Coverage Report
        # Luôn upload để xem báo cáo kể cả khi không đạt 80%
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/